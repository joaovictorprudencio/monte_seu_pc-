# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: postgresql
  encoding: unicode
  timeout: 8000
  username: <%=ENV["DB_USER"] %>
  password: <%=ENV["DB_PASSWORD"] %>
  host: localhost
  port: 5432


development:
  <<: *default
  database: mt_seu_pc




 